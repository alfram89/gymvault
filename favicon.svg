<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#1a2f52"/>
      <stop offset="100%" stop-color="#07090f"/>
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="45%"  stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- glow behind barbell -->
  <ellipse cx="50" cy="50" rx="46" ry="11" fill="#3b82f6" opacity="0.18" filter="url(#glow)"/>

  <!-- left plate L3 — outer, tallest -->
  <rect x="2"  y="15" width="11" height="70" rx="3"   fill="url(#metal)"/>
  <rect x="2"  y="15" width="11" height="70" rx="3"   fill="url(#shade)"/>
  <rect x="2"  y="15" width="3"  height="70" rx="1"   fill="url(#rim)"/>
  <rect x="2"  y="15" width="11" height="4"  rx="3"   fill="white" fill-opacity="0.10"/>

  <!-- left plate L2 — middle -->
  <rect x="13" y="23" width="9"  height="54" rx="2.5" fill="url(#metal)"/>
  <rect x="13" y="23" width="9"  height="54" rx="2.5" fill="url(#shade)"/>
  <rect x="13" y="23" width="3"  height="54" rx="1"   fill="url(#rim)"/>
  <rect x="13" y="23" width="9"  height="4"  rx="2.5" fill="white" fill-opacity="0.10"/>

  <!-- left plate L1 — inner -->
  <rect x="22" y="31" width="7"  height="38" rx="2"   fill="url(#metal)"/>
  <rect x="22" y="31" width="7"  height="38" rx="2"   fill="url(#shade)"/>
  <rect x="22" y="31" width="2.5" height="38" rx="1"  fill="url(#rim)"/>
  <rect x="22" y="31" width="7"  height="3"  rx="2"   fill="white" fill-opacity="0.12"/>

  <!-- left collar -->
  <rect x="29" y="39" width="6"  height="22" rx="2"   fill="url(#metal)" opacity="0.75"/>
  <rect x="29" y="39" width="6"  height="22" rx="2"   fill="url(#shade)"/>

  <!-- bar -->
  <rect x="35" y="44" width="30" height="12" rx="4"   fill="url(#metal)" opacity="0.65"/>
  <line x1="39" y1="44" x2="39" y2="56" stroke="#07090f" stroke-width="1.1" opacity="0.45"/>
  <line x1="42" y1="44" x2="42" y2="56" stroke="#07090f" stroke-width="1.1" opacity="0.45"/>
  <line x1="45" y1="44" x2="45" y2="56" stroke="#07090f" stroke-width="1.1" opacity="0.45"/>
  <line x1="48" y1="44" x2="48" y2="56" stroke="#07090f" stroke-width="1.1" opacity="0.45"/>
  <line x1="51" y1="44" x2="51" y2="56" stroke="#07090f" stroke-width="1.1" opacity="0.45"/>
  <line x1="54" y1="44" x2="54" y2="56" stroke="#07090f" stroke-width="1.1" opacity="0.45"/>
  <line x1="57" y1="44" x2="57" y2="56" stroke="#07090f" stroke-width="1.1" opacity="0.45"/>
  <line x1="60" y1="44" x2="60" y2="56" stroke="#07090f" stroke-width="1.1" opacity="0.45"/>
  <rect x="35" y="44" width="30" height="3"  rx="2"   fill="white" fill-opacity="0.13"/>

  <!-- right collar -->
  <rect x="65" y="39" width="6"  height="22" rx="2"   fill="url(#metal)" opacity="0.75"/>
  <rect x="65" y="39" width="6"  height="22" rx="2"   fill="url(#shade)"/>

  <!-- right plate R1 — inner -->
  <rect x="71" y="31" width="7"  height="38" rx="2"   fill="url(#metal)"/>
  <rect x="71" y="31" width="7"  height="38" rx="2"   fill="url(#shade)"/>
  <rect x="71" y="31" width="7"  height="3"  rx="2"   fill="white" fill-opacity="0.12"/>

  <!-- right plate R2 — middle -->
  <rect x="78" y="23" width="9"  height="54" rx="2.5" fill="url(#metal)"/>
  <rect x="78" y="23" width="9"  height="54" rx="2.5" fill="url(#shade)"/>
  <rect x="78" y="23" width="9"  height="4"  rx="2.5" fill="white" fill-opacity="0.10"/>

  <!-- right plate R3 — outer, tallest -->
  <rect x="87" y="15" width="11" height="70" rx="3"   fill="url(#metal)"/>
  <rect x="87" y="15" width="11" height="70" rx="3"   fill="url(#shade)"/>
  <rect x="87" y="15" width="11" height="4"  rx="3"   fill="white" fill-opacity="0.10"/>
</svg>
